[tool.ruff]
target-version = "py310"  # Ubuntu 22.04 / ROS 2 Humble ships Python 3.10
line-length = 99           # matches ament_flake8 / ament_pep8 default

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (undefined names, unused imports, etc.)
    "I",    # isort (import ordering)
    "UP",   # pyupgrade (modernise syntax for Python 3.10+)
    "B",    # flake8-bugbear (likely bugs and design issues)
    "C4",   # flake8-comprehensions (unnecessary list/dict/set calls)
    "SIM",  # flake8-simplify (simplifiable conditions)
    "RUF",  # ruff-specific rules
]
ignore = [
    # Line length is enforced by the formatter, not the linter
    "E501",
    # ROS 2 callbacks frequently use mutable default args in class bodies
    "B006",
    # Ternary operator rewrites are often less readable in ROS callback style
    "SIM108",
    # Allow Union[X, Y] alongside X | Y during gradual migration
    "UP007",
    # × and – in docstrings are intentional Unicode for layout/range descriptions
    "RUF002",
    "RUF003",
]

[tool.ruff.lint.isort]
known-first-party = ["vinyl_robot_msgs"]
# ROS imports come from a separate system install — treat as third-party
known-third-party = ["rclpy", "std_msgs", "sensor_msgs", "py_trees", "py_trees_ros", "yaml"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
